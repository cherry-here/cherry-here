<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mothi Charan — ECE Portfolio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020810;color:#cce3f0;font-family:'Share Tech Mono',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
.loader{text-align:center}
.loader-ring{width:60px;height:60px;border:2px solid rgba(0,255,231,0.15);border-top:2px solid #00ffe7;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:.7rem;color:#4a6880;letter-spacing:.3em}
</style>
<script>
(function(){
  var isMobile = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
    || (window.innerWidth <= 768);
  if(isMobile){
    window.location.replace('index-mobile.html');
  } else {
    window.location.replace('index-desktop.html');
  }
})();
</script>
</head>
<body>
<div class="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">// LOADING PORTFOLIO...</div>
</div>
</body>
</html>
